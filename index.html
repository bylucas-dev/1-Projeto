<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfólio de desenvolvedor web e designer gráfico">
    <meta name="keywords" content="portfólio, desenvolvedor, web">
    <meta property="og:title" content="Meu Portfólio">
    <meta property="og:description" content="Confira meus projetos e habilidades">
    
    <title>Meu Portfólio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Nome do Portfólio</h1>
        <p>Desenvolvedor Web | Designer Gráfico</p>
    </header>
    
    <nav aria-label="Menu de navegação">
        <ul>
            <li><a href="#sobre">Sobre Mim</a></li>
            <li><a href="#projetos">Projetos</a></li>
            <li><a href="#contato">Contato</a></li>
        </ul>
    </nav>
    
    <main>
        <section id="sobre">
            <h2>Sobre Mim</h2>
            <img 
                src="foto_perfil.jpg" 
                alt="Foto de Perfil"
                loading="lazy"
                width="200"
                height="200"
            >
            <p>Texto sobre você, suas habilidades e experiências.</p>
        </section>
        
        <section id="projetos">
            <h2>Projetos</h2>
            <div class="projeto">
                <img 
                    src="projeto1.jpg" 
                    alt="Projeto 1: Nome do Projeto"
                    loading="lazy"
                    width="300"
                    height="200"
                >
                <h3>Nome do Projeto 1</h3>
                <p>Descrição breve do projeto 1.</p>
            </div>
            <!-- Adicione mais projetos conforme necessário -->
        </section>
        
        <section id="contato">
            <h2>Contato</h2>
            <form id="contactForm" action="submit_form.php" method="post">
                <div>
                    <label for="nome">Nome:</label>
                    <input 
                        type="text" 
                        id="nome"
                        name="nome" 
                        placeholder="Seu Nome" 
                        required
                        minlength="3"
                    >
                </div>
                <div>
                    <label for="email">Email:</label>
                    <input 
                        type="email" 
                        id="email"
                        name="email" 
                        placeholder="Seu Email" 
                        required
                    >
                </div>
                <div>
                    <label for="mensagem">Mensagem:</label>
                    <textarea 
                        id="mensagem"
                        name="mensagem" 
                        placeholder="Sua Mensagem"
                        minlength="10"
                        required
                    ></textarea>
                </div>
                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2026 Nome do Portfólio. Todos os direitos reservados.</p>
    </footer>
    
    <script>
        // Validação básica no frontend
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            const email = document.getElementById('email').value;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            if (!emailRegex.test(email)) {
                e.preventDefault();
                alert('Por favor, insira um email válido');
            }
        });
    </script>
</body>
</html>
